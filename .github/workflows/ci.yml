name: Frontend CI - TaskSphere

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test -- --reporter=default --reporter=github-actions

      - name: Build frontend app
        run: npm run build

      - name: Build frontend Docker image
        run: |
          docker build -t a2-tasksphere-frontend .
